name: Full Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  full-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run full test suite
        run: poetry run pytest mean_field_tools/deep_bsde/test/
